# ────────────────────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/LOGO_APP_COLOMBIAGO.png"
  adaptive_icon_background: "#FFBB02"
  adaptive_icon_foreground: "assets/images/LOGO_APP_COLOMBIAGO.png"
  min_sdk_android: 21