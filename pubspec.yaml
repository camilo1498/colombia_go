name: colombia_go
description: "Tu parcero en la vuelta turística"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  image_picker: ^1.0.7
  flutter_map: ^7.0.2
  url_launcher: ^6.3.0
  latlong2: ^0.9.1
  google_sign_in: ^7.2.0
  cached_network_image: ^3.3.1
  permission_handler: ^11.3.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  shared_preferences: ^2.5.4
  geolocator: ^10.1.0  
   
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1  # ← Agregado para el logo de la app

